; NUCLEO-F401RE USART1 (Arduino connector D0/D1)
; Pins: PA9 (TX), PA10 (RX)

[arduino_uart]
driver_name=dmuart
baudrate=921600
databits=8
parity=none
stopbits=1
flowcontrol=none
instance=1

[arduino_uart_tx]
driver_name=dmgpio
pin=PA9
mode=alternate
alternate_function=7
speed=maximum
output_circuit=push_pull
pull=up

[arduino_uart_rx]
driver_name=dmgpio
pin=PA10
mode=alternate
alternate_function=7
pull=up
