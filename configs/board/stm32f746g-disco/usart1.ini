; STM32F746G-DISCO USART1 (ST-Link Virtual COM Port)
; Pins: PA9 (TX), PB7 (RX)

[stlink_vcp]
driver_name=dmuart
baudrate=921600
databits=8
parity=none
stopbits=1
flowcontrol=none
instance=1

[stlink_vcp_tx]
driver_name=dmgpio
pin=PA9
mode=alternate
alternate_function=7
speed=maximum
output_circuit=push_pull
pull=up

[stlink_vcp_rx]
driver_name=dmgpio
pin=PB7
mode=alternate
alternate_function=7
pull=up
