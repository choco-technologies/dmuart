; NUCLEO-F767ZI USART3 (ST-Link Virtual COM Port)
; Pins: PD8 (TX), PD9 (RX)

[stlink_vcp]
driver_name=dmuart
baudrate=921600
databits=8
parity=none
stopbits=1
flowcontrol=none
instance=3

[stlink_vcp_tx]
driver_name=dmgpio
pin=PD8
mode=alternate
alternate_function=7
speed=maximum
output_circuit=push_pull
pull=up

[stlink_vcp_rx]
driver_name=dmgpio
pin=PD9
mode=alternate
alternate_function=7
pull=up
