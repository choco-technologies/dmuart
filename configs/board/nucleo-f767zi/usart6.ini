; NUCLEO-F767ZI USART6 (Arduino connector D0/D1)
; Pins: PG14 (TX), PG9 (RX)

[arduino_uart_tx]
driver_name=dmgpio
pin=PG14
mode=alternate
alternate_function=8
speed=maximum
output_circuit=push_pull
pull=up

[arduino_uart_rx]
driver_name=dmgpio
pin=PG9
mode=alternate
alternate_function=8
pull=up

[arduino_uart]
driver_name=dmuart
baudrate=921600
databits=8
parity=none
stopbits=1
flowcontrol=none
instance=6
