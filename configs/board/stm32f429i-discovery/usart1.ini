; STM32F429I-DISCOVERY USART1
; Pins: PA9 (TX), PA10 (RX)

[usart1]
driver_name=dmuart
baudrate=921600
databits=8
parity=none
stopbits=1
flowcontrol=none
instance=1

[usart1_tx]
driver_name=dmgpio
pin=PA9
mode=alternate
alternate_function=7
speed=maximum
output_circuit=push_pull
pull=up

[usart1_rx]
driver_name=dmgpio
pin=PA10
mode=alternate
alternate_function=7
pull=up
